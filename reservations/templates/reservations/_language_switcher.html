{% load i18n %}
<style>
  .language-switcher {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 5000;
    display: inline-flex;
    gap: 4px;
    align-items: center;
    padding: 4px;
    border: 1px solid rgba(148, 163, 184, 0.38);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.92);
    box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
    backdrop-filter: blur(8px);
  }
  .language-switcher button {
    min-width: 54px;
    padding: 6px 10px;
    border: 0;
    border-radius: 999px;
    background: transparent;
    color: #334155;
    font: 700 12px/1 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    cursor: pointer;
  }
  .language-switcher button.active {
    background: #0f172a;
    color: #fff;
  }
  @media (prefers-color-scheme: dark) {
    .language-switcher {
      background: rgba(15, 23, 42, 0.86);
      border-color: rgba(148, 163, 184, 0.28);
    }
    .language-switcher button {
      color: #dbeafe;
    }
    .language-switcher button.active {
      background: #e0f2fe;
      color: #0f172a;
    }
  }
</style>
<form action="{% url 'set_language' %}" method="post" class="language-switcher" aria-label="Language">
  {% csrf_token %}
  <input name="next" type="hidden" value="{{ request.get_full_path }}">
  <button type="submit" name="language" value="ko" class="{% if request.LANGUAGE_CODE|slice:':2' == 'ko' %}active{% endif %}">한글</button>
  <button type="submit" name="language" value="en" class="{% if request.LANGUAGE_CODE|slice:':2' == 'en' %}active{% endif %}">EN</button>
</form>

      [/^교리실 (.+) 예약$/, "Room $1 Reservation"],
      [/^예약 ([0-9]+)건$/, "$1 reservations"],
      [/^총 ([0-9]+)건$/, "Total $1"],
      [/^로딩 완료 · ([0-9]+)개 교리실$/, "Loaded · $1 rooms"],
      [/^([0-9]{4}-[0-9]{2}-[0-9]{2})  ([0-9:]+)[–-]([0-9:]+)  \(30분 단위\)$/, "$1  $2-$3  (30-minute slots)"],

      [/^반복 종료일: (.+)$/, "Repeat end date: $1"],
      [/^종료 예정: (.+)$/, "Expected end: $1"],
      [/^([0-9]+)분$/, "$1 min"],
      [/^([0-9]+)월$/, "$1"],
      [/^([0-9]+)월 ([0-9]+)일 \((.+)\)$/, "$1/$2 ($3)"],
      [/^([0-9]{4})년 ([0-9]+)월 ([0-9]+)일까지$/, "until $2/$3/$1"],
      [/^매주 (.+)요일$/, "Every week on $1"],
      [/^2주마다 (.+)요일$/, "Every 2 weeks on $1"],
      [/^([0-9]+)주마다 (.+)요일$/, "Every $1 weeks on $2"],
      [/^매월 ([0-9]+)일$/, "Monthly on day $1"],
      [/^매월 (.+) 주 (.+)요일$/, "Monthly on the $1 week, $2"],
      [/^정말 취소할까요\?\n\(범위: (.+)\)$/, "Are you sure you want to cancel?\n(Scope: $1)"],
      [/^예약 #(.+) 을\(를\) (.+) 취소할까요\?$/, "Cancel reservation #$1 as $2?"],
      [/^오류: (.+)$/, "Error: $1"],
      [/^수정 실패: (.+)$/, "Update failed: $1"]
    ];

    function translateText(value) {
      if (currentLanguage !== "en" || typeof value !== "string" || !value.trim()) return value;
      const leading = value.match(/^\s*/)[0];
      const trailing = value.match(/\s*$/)[0];
      let text = value.trim();
      if (exact[text]) return leading + exact[text] + trailing;
      for (const [pattern, replacement] of patterns) {
        if (pattern.test(text)) {
          return leading + text.replace(pattern, replacement) + trailing;
        }
      }
      return value;
    }

    window.tText = translateText;
    window.translateUi = translateNode;

    function translateElement(el) {
      if (!el || el.closest(".language-switcher")) return;
      for (const attr of ["placeholder", "title", "aria-label", "alt"]) {
        if (el.hasAttribute && el.hasAttribute(attr)) {
          el.setAttribute(attr, translateText(el.getAttribute(attr)));
        }
      }
    }

    function translateNode(node) {
      if (currentLanguage !== "en") return;
      if (node.nodeType === Node.TEXT_NODE) {
        if (node.parentElement && node.parentElement.closest(".language-switcher")) return;
        node.nodeValue = translateText(node.nodeValue);
        return;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) return;
      translateElement(node);
      const walker = document.createTreeWalker(node, NodeFilter.SHOW_TEXT);
      const textNodes = [];
      while (walker.nextNode()) textNodes.push(walker.currentNode);
      textNodes.forEach(translateNode);
      node.querySelectorAll?.("[placeholder], [title], [aria-label], [alt]").forEach(translateElement);
    }

    if (currentLanguage === "en") {
      const rawAlert = window.alert;
      const rawConfirm = window.confirm;
      window.alert = function (message) { return rawAlert.call(window, translateText(String(message))); };
      window.confirm = function (message) { return rawConfirm.call(window, translateText(String(message))); };

      document.addEventListener("DOMContentLoaded", function () {
        translateNode(document.body);
      });
    }
  })();
